<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rosa Pay V2 Mock UI</title>
  <style>
    :root {
      --black: #050505;
      --dark: #0b0d0f;
      --dark-2: #111111;
      --graphite: #1C1C1E;
      --card: #17181b;
      --card-2: #202124;
      --border: #343434;
      --gold: #D4AF37;
      --gold-2: #F1D27A;
      --text: #F5F5F5;
      --muted: #A1A1AA;
      --danger: #ff5b5b;
      --success: #4ade80;
      --warning: #facc15;
      --shadow: rgba(212, 175, 55, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.15), transparent 32%),
        radial-gradient(circle at bottom right, rgba(241, 210, 122, 0.08), transparent 26%),
        linear-gradient(135deg, #030303 0%, #090a0c 45%, #111111 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input, select, textarea {
      font-family: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid rgba(255,255,255,0.08);
      background: rgba(5, 5, 5, 0.82);
      backdrop-filter: blur(18px);
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 8px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #fff4b8 0%, var(--gold-2) 15%, var(--gold) 42%, #7b5b13 80%);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.25);
      display: grid;
      place-items: center;
      color: #0a0a0a;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .brand h1 {
      font-size: 21px;
      margin: 0;
      letter-spacing: 0.2px;
      color: var(--gold-2);
      font-family: Georgia, serif;
    }

    .brand p {
      margin: 1px 0 0;
      font-size: 11px;
      color: var(--muted);
    }

    .nav-group-label {
      margin: 3px 10px;
      font-size: 11px;
      color: #74747d;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      font-weight: 800;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav button {
      border: 1px solid transparent;
      color: var(--muted);
      background: transparent;
      padding: 12px 12px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.18s ease;
      font-size: 14px;
      text-align: left;
    }

    .nav button:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    .nav button.active {
      color: #111;
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.18);
    }

    .sidebar-footer {
      margin-top: auto;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,0.03);
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3a2b0a, var(--gold));
      display: grid;
      place-items: center;
      color: #111;
      font-weight: 900;
    }

    .main {
      padding: 24px;
      overflow: hidden;
    }

    .topbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .page-title h2 {
      margin: 0;
      font-size: 27px;
      letter-spacing: -0.8px;
    }

    .page-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.12);
    }

    .btn {
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      background: rgba(255,255,255,0.04);
      padding: 12px 16px;
      border-radius: 13px;
      cursor: pointer;
      font-weight: 800;
      transition: 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(212, 175, 55, 0.55);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      color: #090909;
      border-color: transparent;
      box-shadow: 0 12px 30px rgba(212, 175, 55, 0.16);
    }

    .btn-danger {
      color: #fff;
      background: rgba(255, 91, 91, 0.12);
      border-color: rgba(255, 91, 91, 0.3);
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .stats-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .two-col {
      grid-template-columns: 1.05fr 0.95fr;
    }

    .three-col {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .card {
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025));
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.22);
      backdrop-filter: blur(16px);
    }

    .card-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .card h3 {
      margin: 0;
      font-size: 16px;
    }

    .card p {
      color: var(--muted);
    }

    .stat .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .stat .value {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .stat .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .spark {
      height: 38px;
      margin-top: 10px;
      background:
        linear-gradient(135deg, transparent 0 35%, rgba(212,175,55,0.14) 36% 45%, transparent 46% 100%),
        linear-gradient(90deg, rgba(212,175,55,0.2), rgba(212,175,55,0.02));
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }

    .spark::after {
      content: "";
      position: absolute;
      inset: 16px 10px 9px;
      background: linear-gradient(135deg, transparent 0 12%, var(--gold) 13% 15%, transparent 16% 24%, var(--gold) 25% 27%, transparent 28% 43%, var(--gold) 44% 47%, transparent 48% 58%, var(--gold) 59% 62%, transparent 63%);
      opacity: 0.85;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      color: #777780;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      text-align: left;
      padding: 12px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    td {
      padding: 14px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.055);
      color: #e7e7e7;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .badge-paid {
      background: rgba(74, 222, 128, 0.14);
      color: #8ef0ad;
    }

    .badge-pending {
      background: rgba(212, 175, 55, 0.16);
      color: var(--gold-2);
    }

    .badge-expired, .badge-failed {
      background: rgba(255, 91, 91, 0.14);
      color: #ff9b9b;
    }

    .form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: #cfcfcf;
      font-size: 13px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.26);
      color: var(--text);
      border-radius: 13px;
      padding: 13px 14px;
      outline: none;
      transition: 0.18s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(212,175,55,0.65);
      box-shadow: 0 0 0 4px rgba(212,175,55,0.08);
    }

    .hidden {
      display: none !important;
    }

    .screen {
      display: none;
      animation: fade 0.18s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .qr-box {
      background: #f7f7f7;
      color: #111;
      border-radius: 20px;
      width: min(270px, 100%);
      aspect-ratio: 1;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      place-items: center;
      position: relative;
      box-shadow: 0 20px 50px rgba(0,0,0,0.28);
    }

    .qr-grid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(13, 1fr);
      grid-template-rows: repeat(13, 1fr);
      gap: 3px;
    }

    .qr-cell {
      background: #111;
      border-radius: 1px;
      opacity: 0;
    }

    .qr-cell.on {
      opacity: 1;
    }

    .qr-logo {
      position: absolute;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      color: #111;
      font-weight: 900;
      box-shadow: 0 0 0 8px #f7f7f7;
    }

    .detail-list {
      display: grid;
      gap: 0;
      margin-top: 18px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      color: var(--muted);
      font-size: 14px;
    }

    .detail-row strong {
      color: var(--text);
      text-align: right;
    }

    .phone-area {
      min-height: calc(100vh - 48px);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .phone {
      width: 390px;
      max-width: 100%;
      min-height: 760px;
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 42px;
      padding: 14px;
      background: #070809;
      box-shadow: 0 30px 100px rgba(0,0,0,0.45), 0 0 60px rgba(212,175,55,0.08);
      position: relative;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 28px;
      border-radius: 999px;
      background: #020202;
      z-index: 2;
    }

    .phone-screen {
      min-height: 730px;
      border-radius: 32px;
      padding: 42px 18px 20px;
      background:
        radial-gradient(circle at 80% 5%, rgba(212,175,55,0.12), transparent 30%),
        linear-gradient(180deg, #0b0d0f, #050505);
      overflow: hidden;
    }

    .mobile-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 12px;
    }

    .checkout-brand {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 18px;
    }

    .checkout-brand .brand-mark {
      width: 34px;
      height: 34px;
      font-size: 13px;
    }

    .checkout-brand h2 {
      margin: 0;
      color: var(--gold-2);
      font-family: Georgia, serif;
    }

    .amount-card {
      border: 1px solid rgba(212,175,55,0.28);
      background: linear-gradient(135deg, rgba(212,175,55,0.16), rgba(255,255,255,0.035));
      border-radius: 22px;
      padding: 20px;
      margin: 14px 0;
    }

    .big-amount {
      font-size: 38px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: -1.2px;
    }

    .wallet-option {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .wallet-option:hover {
      border-color: rgba(212,175,55,0.48);
      transform: translateY(-1px);
    }

    .wallet-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .wallet-icon {
      width: 39px;
      height: 39px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #111;
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
    }

    .success-check {
      width: 94px;
      height: 94px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 42px auto 25px;
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.28);
      font-size: 52px;
      color: var(--success);
    }

    .mobile-actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .mobile-actions .btn {
      width: 100%;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 10px 13px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      cursor: pointer;
      font-weight: 800;
      font-size: 13px;
    }

    .tab.active {
      background: rgba(212,175,55,0.14);
      color: var(--gold-2);
      border-color: rgba(212,175,55,0.35);
    }

    .mock-note {
      border: 1px solid rgba(212,175,55,0.24);
      border-radius: 18px;
      padding: 14px;
      background: rgba(212,175,55,0.06);
      color: #dfd7bd;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .mobile-only-nav {
      display: none;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(5,5,5,0.88);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
    }

    .mobile-select {
      width: 100%;
    }

    .empty {
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 22px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,0.02);
    }

    @media (max-width: 1180px) {
      .stats-grid, .three-col {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 860px) {
      .app {
        display: block;
      }
      .sidebar {
        display: none;
      }
      .mobile-only-nav {
        display: block;
      }
      .main {
        padding: 16px;
      }
      .topbar {
        align-items: start;
        flex-direction: column;
      }
      .stats-grid, .three-col {
        grid-template-columns: 1fr;
      }
      table {
        min-width: 680px;
      }
      .table-wrap {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <div class="mobile-only-nav">
    <select class="mobile-select" id="mobileScreenSelect"></select>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">R</div>
        <div>
          <h1>Rosa Pay</h1>
          <p>Non-Custodial QR Payments on Stellar</p>
        </div>
      </div>

      <div>
        <div class="nav-group-label">Merchant</div>
        <nav class="nav" id="merchantNav"></nav>
      </div>

      <div>
        <div class="nav-group-label">Customer</div>
        <nav class="nav" id="customerNav"></nav>
      </div>

      <div class="sidebar-footer">
        <div class="profile">
          <div class="avatar">E</div>
          <div>
            <strong>Ege</strong>
            <div style="font-size:12px;color:var(--muted)">Merchant • GABC...XY123</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="mock-note">
        Bu dosya Rosa Pay V2 için mock data ile çalışan tek sayfalık HTML preview’dır. Sol menüden merchant ve customer ekranlarının tamamını test edebilirsin. Gerçek backend/blockchain bağlantısı yoktur.
      </div>

      <section class="screen active" id="overview"></section>
      <section class="screen" id="businesses"></section>
      <section class="screen" id="branches"></section>
      <section class="screen" id="payments"></section>
      <section class="screen" id="create-payment"></section>
      <section class="screen" id="payment-detail"></section>
      <section class="screen" id="transactions"></section>
      <section class="screen" id="customers"></section>
      <section class="screen" id="security"></section>
      <section class="screen" id="settings"></section>
      <section class="screen" id="customer-qr"></section>
      <section class="screen" id="customer-checkout"></section>
      <section class="screen" id="customer-wallet"></section>
      <section class="screen" id="customer-review"></section>
      <section class="screen" id="customer-success"></section>
    </main>
  </div>

  <script>
    const mock = {
      merchant: {
        name: "Ege",
        wallet: "GABC...XY123",
        network: "Stellar Testnet"
      },
      businesses: [
        { id: "bus_01", name: "Rosa Cafe", slug: "rosa-cafe", branches: 2, status: "Active", received: "940.25 XLM" },
        { id: "bus_02", name: "Golden Studio", slug: "golden-studio", branches: 1, status: "Active", received: "300.00 XLM" },
        { id: "bus_03", name: "Norm Pop-up Store", slug: "norm-popup", branches: 3, status: "Draft", received: "0.00 XLM" }
      ],
      branches: [
        { id: "br_01", business: "Rosa Cafe", name: "Alsancak Branch", wallet: "GABC...XY123", payments: 19, status: "Active" },
        { id: "br_02", business: "Rosa Cafe", name: "Bostanlı Branch", wallet: "GDEF...LQ987", payments: 8, status: "Active" },
        { id: "br_03", business: "Golden Studio", name: "Online Checkout", wallet: "GHIJ...MN456", payments: 5, status: "Active" }
      ],
      payments: [
        { id: "pay_7f9s2k", business: "Rosa Cafe", branch: "Alsancak Branch", amount: "10.00", asset: "XLM", status: "PENDING", created: "2m ago", memo: "pay_7f9s2k" },
        { id: "pay_3h6d1a", business: "Rosa Cafe", branch: "Alsancak Branch", amount: "25.00", asset: "XLM", status: "PAID", created: "15m ago", memo: "pay_3h6d1a" },
        { id: "pay_9g2b7c", business: "Golden Studio", branch: "Online Checkout", amount: "8.50", asset: "XLM", status: "PAID", created: "1h ago", memo: "pay_9g2b7c" },
        { id: "pay_1a2b3c", business: "Rosa Cafe", branch: "Bostanlı Branch", amount: "15.00", asset: "XLM", status: "EXPIRED", created: "2h ago", memo: "pay_1a2b3c" },
        { id: "pay_8d7f6e", business: "Rosa Cafe", branch: "Alsancak Branch", amount: "30.00", asset: "XLM", status: "PAID", created: "3h ago", memo: "pay_8d7f6e" }
      ],
      transactions: [
        { hash: "0f9a...f3a", payment: "pay_3h6d1a", customer: "GQWE...K92A", amount: "25.00 XLM", status: "CONFIRMED", time: "15m ago" },
        { hash: "7b8c...1d2", payment: "pay_9g2b7c", customer: "GRTY...L81C", amount: "8.50 XLM", status: "CONFIRMED", time: "1h ago" },
        { hash: "32af...9ab", payment: "pay_1a2b3c", customer: "GJKL...P44D", amount: "15.00 XLM", status: "FAILED", time: "2h ago" },
        { hash: "11cd...7ee", payment: "pay_8d7f6e", customer: "GZXC...N77B", amount: "30.00 XLM", status: "CONFIRMED", time: "3h ago" }
      ],
      customers: [
        { wallet: "GQWE...K92A", payments: 3, volume: "48.00 XLM", firstSeen: "Today" },
        { wallet: "GRTY...L81C", payments: 1, volume: "8.50 XLM", firstSeen: "Today" },
        { wallet: "GZXC...N77B", payments: 4, volume: "92.00 XLM", firstSeen: "Yesterday" }
      ]
    };

    const merchantScreens = [
      ["overview", "Overview", "◈"],
      ["businesses", "Businesses", "▣"],
      ["branches", "Branches", "⌂"],

    function createNav() {
      const merchantNav = document.getElementById("merchantNav");
      const customerNav = document.getElementById("customerNav");
      merchantNav.innerHTML = merchantScreens.map(([id, label, icon]) => `<button data-screen="${id}" class="${id === "overview" ? "active" : ""}" onclick="showScreen('${id}')"><span>${icon}</span>${label}</button>`).join("");
      customerNav.innerHTML = customerScreens.map(([id, label, icon]) => `<button data-screen="${id}" onclick="showScreen('${id}')"><span>${icon}</span>${label}</button>`).join("");

      const select = document.getElementById("mobileScreenSelect");
      const all = [...merchantScreens, ...customerScreens];
      select.innerHTML = all.map(([id, label]) => `<option value="${id}">${label}</option>`).join("");
      select.addEventListener("change", e => showScreen(e.target.value));
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      document.querySelectorAll(".nav button").forEach(b => b.classList.toggle("active", b.dataset.screen === id));
      const select = document.getElementById("mobileScreenSelect");
      if (select) select.value = id;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    renderAll();
    createNav();
